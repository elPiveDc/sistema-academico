<!doctype html>
<html>
  <head>
    <title>Sistema Académico</title>
  </head>
  <body>
    <h1>Bienvenido al sistema académico</h1>
    <form>
      <label>Usuario:</label>
      <input type="text" name="usuario" /><br />

  </body>
</html>
